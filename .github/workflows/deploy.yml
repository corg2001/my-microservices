name: Build and Deploy Microservices

on:
  push:
    branches: [ main ]

env:
  AZURE_RESOURCE_GROUP: my-microservices-rg
  ACR_NAME: mymicroservicesacr
  CONTAINER_APPS_ENV: my-microservices-env
  SQL_SERVER: my-microservices-sql.database.windows.net
  SQL_DATABASE: my-microservices-db

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout code ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Login to Azure ─────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      # ── Deploy Infrastructure (Bicep) ──────────────────────
      - name: Deploy Infrastructure
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            eventHubsConnectionString=${{ secrets.EVENTHUBS_CONNECTION_STRING }}
            storageConnectionString=${{ secrets.STORAGE_CONNECTION_STRING }}
            acrUsername=${{ secrets.ACR_USERNAME }}
            acrPassword=${{ secrets.ACR_PASSWORD }}
            serviceBusConnectionString=${{ secrets.SERVICEBUS_CONNECTION_STRING }}
          failOnStdErr: false

      # ── Install sqlcmd ─────────────────────────────────────
      - name: Install sqlcmd
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      # ── Run Database Migrations ────────────────────────────
      - name: Run CDC Migration
        run: |
          sqlcmd \
            -S ${{ env.SQL_SERVER }} \
            -d ${{ env.SQL_DATABASE }} \
            -U sqladmin \
            -P "${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -i EmployeeService/Migrations/Scripts/enable-cdc.sql \
            -b

      # ── Login to ACR ───────────────────────────────────────
      - name: Login to ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Build and Push Debezium ────────────────────────────
      - name: Build and Push Debezium
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/debezium:latest \
            -f debezium/Dockerfile \
            debezium/
          docker push ${{ env.ACR_NAME }}.azurecr.io/debezium:latest

      # ── Build and Push OrderService ────────────────────────
      - name: Build and Push OrderService
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/orderservice:${{ github.sha }} \
            -f My_Microservices/Dockerfile \
            My_Microservices/
          docker push ${{ env.ACR_NAME }}.azurecr.io/orderservice:${{ github.sha }}

      # ── Build and Push InventoryService ───────────────────
      - name: Build and Push InventoryService
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/inventoryservice:${{ github.sha }} \
            -f InventoryService/Dockerfile \
            InventoryService/
          docker push ${{ env.ACR_NAME }}.azurecr.io/inventoryservice:${{ github.sha }}

      # ── Build and Push EmployeeService ────────────────────
      - name: Build and Push EmployeeService
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/employeeservice:${{ github.sha }} \
            -f EmployeeService/Dockerfile \
            EmployeeService/
          docker push ${{ env.ACR_NAME }}.azurecr.io/employeeservice:${{ github.sha }}

      # ── Deploy OrderService ────────────────────────────────
      - name: Deploy OrderService
        run: |
          az containerapp update \
            --name orderservice \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/orderservice:${{ github.sha }}

      # ── Deploy InventoryService ───────────────────────────
      - name: Deploy InventoryService
        run: |
          az containerapp update \
            --name inventoryservice \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/inventoryservice:${{ github.sha }}

      # ── Deploy EmployeeService ────────────────────────
      - name: Deploy EmployeeService
        run: |
          # Ensure Event Hubs secret exists in the Container App
          az containerapp secret set \
            --name employeeservice \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets "eventhubs-connection-string=${{ secrets.EVENTHUBS_CONNECTION_STRING }}"
          # Deploy new image and wire Event Hubs connection string as env var
          az containerapp update \
            --name employeeservice \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/employeeservice:${{ github.sha }} \
            --set-env-vars "EventHubs__ConnectionString=secretref:eventhubs-connection-string"
      # ── Deploy Debezium ───────────────────────────────────
      - name: Deploy Debezium
        run: |
          az containerapp update \
            --name debezium \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/debezium:latest