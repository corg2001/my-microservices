services:
  orderservice:
    build: ./My_Microservices
    container_name: orderservice.dev
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - redis
    restart: unless-stopped

  inventoryservice:
    build: ./InventoryService
    container_name: inventoryservice.dev
    ports:
      - "8082:8080"           # Different external port
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:6
    container_name: dapr_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  dapr-placement:
    image: daprio/dapr
    command: ["./placement"]
    ports:
      - "50006:50006"